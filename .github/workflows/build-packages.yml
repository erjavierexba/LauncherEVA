name: Build packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  linux-deb:
    name: Build .deb
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux build libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            libasound2t64 \
            libegl1 \
            libportaudio2 \
            libxcb-cursor0 \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install "PyInstaller>=6.0" pytest pillow

      - name: Run tests
        run: python -m pytest

      - name: Build Debian package
        run: python scripts/build_deb.py

      - name: Upload Debian package
        uses: actions/upload-artifact@v7
        with:
          name: launcher-eva-deb
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 14

  windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install "PyInstaller>=6.0" pytest pillow

      - name: Run tests
        run: python -m pytest

      - name: Build Windows installer
        run: python scripts/build_windows_installer.py

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: launcher-eva-windows
          path: |
            dist/LauncherEVA.exe
            dist/LauncherEVA_Setup_*.exe
          if-no-files-found: error
          retention-days: 14
