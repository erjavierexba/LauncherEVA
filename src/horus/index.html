<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111923" />
  <title>{{CLIENT_TITLE}}</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/horus.css" />
  {{THEME_STYLE}}
</head>
<body>
  <main class="app-shell">
    <section id="loginView" class="login-view">
      <div class="brand">
        <span class="brand-kicker">{{CLIENT_SUBTITLE}}</span>
        <h1>{{CLIENT_TITLE}}</h1>
      </div>
      <form id="loginForm" class="login-form">
        <label for="usernameInput">Jugador</label>
        <input id="usernameInput" autocomplete="username" placeholder="Tu nombre" />
        <button type="submit">Entrar</button>
      </form>
      <p id="loginStatus" class="status-text">Conecta con EVA en este dispositivo.</p>
    </section>

    <section id="appView" class="app-view" hidden>
      <header class="topbar">
        <div>
          <span class="brand-kicker">{{CLIENT_TITLE}}</span>
          <h1 id="playerName">Jugador</h1>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" class="icon-button" type="button" title="Refrescar">↻</button>
          <button id="logoutButton" class="icon-button danger" type="button" title="Salir">×</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Vistas">
        <button class="tab active" type="button" data-view="characterSelect">Personaje</button>
        <button class="tab" type="button" data-view="sheet">Ficha</button>
        <button class="tab" type="button" data-view="scene">Escena</button>
      </nav>

      <div id="statusLine" class="status-line">Listo.</div>

      <section id="characterSelectView" class="view character-select-view active">
        <div class="section-header">
          <h2>Personaje</h2>
        </div>
        <div id="characterOverview" class="character-overview"></div>
        <div class="panel-title">Cambiar personaje</div>
        <div id="characterSelectList" class="character-select-list"></div>
        <div class="character-manager">
          <div class="panel-title">Crear personaje</div>
          <form id="characterForm" class="character-form">
            <input id="characterNameInput" autocomplete="off" placeholder="Nombre del personaje" />
            <textarea id="characterNotesInput" rows="2" placeholder="Notas"></textarea>
            <button type="submit">Crear</button>
          </form>
        </div>
      </section>

      <section id="sheetView" class="view">
        <div class="section-header">
          <h2>Ficha</h2>
          <button id="changeCharacterButton" class="secondary" type="button">Cambiar</button>
        </div>
        <div id="sheetList" class="sheet-list"></div>
      </section>

      <section id="sceneView" class="view">
        <div id="countdownPanel" class="panel" hidden></div>
        <div class="panel dice-roller">
          <div class="panel-title">Dados</div>
          <div class="dice-form">
            <input id="diceFormulaInput" autocomplete="off" autocapitalize="none" spellcheck="false" value="d20" aria-label="Formula de dados" />
            <button id="rollFormulaButton" type="button">Lanzar</button>
          </div>
          <div id="diceFormulaResult" class="dice-result">d20</div>
          <div id="rollHistoryList" class="roll-history"></div>
        </div>
        <div class="section-header">
          <h2>Archivos</h2>
          <button id="clearMediaButton" class="secondary" type="button">Limpiar</button>
        </div>
        <div id="mediaList" class="media-list"></div>
      </section>
    </section>
  </main>

  <dialog id="mediaDialog" class="media-dialog">
    <div class="dialog-header">
      <h2 id="mediaTitle">Archivo</h2>
      <button id="closeMediaButton" class="icon-button" type="button">×</button>
    </div>
    <div id="mediaBody" class="media-body"></div>
  </dialog>

  <dialog id="characterDeleteDialog" class="confirm-dialog">
    <div class="dialog-header">
      <h2 id="characterDeleteTitle">Eliminar personaje</h2>
      <button id="cancelCharacterDeleteButton" class="icon-button" type="button">×</button>
    </div>
    <div class="confirm-dialog-body">
      <p id="characterDeleteMessage">Esta acción no se puede deshacer.</p>
      <div class="confirm-dialog-actions">
        <button id="keepCharacterButton" class="secondary" type="button">Cancelar</button>
        <button id="confirmCharacterDeleteButton" class="danger" type="button">Borrar</button>
      </div>
    </div>
  </dialog>

  <script>
    window.HORUS_WS_URL = "{{WS_URL}}";
    window.HORUS_SESSION_ID = "{{SESSION_ID}}";
    window.HORUS_PORT = "{{HORUS_PORT}}";
  </script>
  <script src="/horus.js"></script>
</body>
</html>
