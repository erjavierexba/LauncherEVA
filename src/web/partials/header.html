<header>
  <div class="brand-block">
    <span class="brand-title">{{APP_TITLE}}</span>
    <span class="brand-subtitle">{{ROLE_SUBTITLE}}</span>
  </div>
  <nav class="view-tabs" aria-label="Vistas del panel">
    <button class="view-tab active" type="button" data-panel-filter="all">Todo</button>
    <button class="view-tab" type="button" data-panel-filter="cards">Cartas</button>
    <button class="view-tab" type="button" data-panel-filter="scene">Escena</button>
    <button class="view-tab" type="button" data-panel-filter="combat">Combate</button>
    <button class="view-tab" type="button" data-panel-filter="admin">Admin</button>
  </nav>
  <div class="header-actions">
    <div class="client-address">
      <span>La aplicación para los jugadores está desplegada en:</span>
      <strong id="clientAddressText">{{CLIENT_ADDRESS}}</strong>
      <button id="copyClientAddressButton" class="compact secondary" type="button" data-copy-text="{{CLIENT_ADDRESS}}">Copiar</button>
    </div>
    <label class="switch-row">
      <span>Checks jugadores</span>
      <input id="checksNpcSwitch" type="checkbox" />
      <span>NPCs</span>
    </label>
    <button id="openSettingsButton" class="icon-button secondary" title="Configuración" aria-label="Configuración">⚙</button>
  </div>
</header>
